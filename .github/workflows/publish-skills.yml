name: Publish Skills

on:
  push:
    paths:
      - 'skills/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package skills
        run: |
          cd skills
          for dir in */; do
            if [ -f "${dir}SKILL.md" ]; then
              skill_id="${dir%/}"
              zip -r "${skill_id}.zip" "$dir"
              echo "Packaged: ${skill_id}.zip"
            fi
          done

      - name: Generate skill-menu.json
        run: |
          cd skills
          base="https://github.com/neatlogs/skills/releases/latest/download"
          # Emit one menu entry per skill dir that has a SKILL.md, so the menu
          # always stays in sync with the published .zip artifacts. The "name"
          # is read from the SKILL.md frontmatter `description` (falls back to id).
          entries=""
          for dir in */; do
            [ -f "${dir}SKILL.md" ] || continue
            skill_id="${dir%/}"
            name=$(grep -m1 '^description:' "${dir}SKILL.md" | sed 's/^description:[[:space:]]*//' | tr -d '"' | cut -c1-80)
            [ -z "$name" ] && name="$skill_id"
            # JSON-escape the name (quotes/backslashes)
            name=$(printf '%s' "$name" | sed 's/\\/\\\\/g; s/"/\\"/g')
            [ -n "$entries" ] && entries="${entries},"
            entries="${entries}{\"id\":\"${skill_id}\",\"name\":\"${name}\",\"downloadUrl\":\"${base}/${skill_id}.zip\"}"
          done
          printf '{"version":"1.0","categories":{"setup":[%s]}}' "$entries" > skill-menu.json
          echo "Generated skill-menu.json:"
          cat skill-menu.json | python3 -m json.tool

      - name: Create/update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: skills-latest
          name: Skills (Latest)
          body: Auto-published skill packages for the Neatlogs wizard
          files: |
            skills/*.zip
            skills/skill-menu.json
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
